services:
  arch:
    build:
      context: .
      dockerfile: Dockerfile.arch
    volumes:
      - /data/projects/latte-dock-ng:/src:ro
    tmpfs:
      - /build
    working_dir: /build
    command: >-
      bash -c "
        cmake /src -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release &&
        cmake --build . --parallel $(nproc) &&
        cmake --install . &&
        echo '--- Verifying installed files ---' &&
        test -x /usr/bin/latte-dock-ng &&
        test -f /usr/share/applications/org.kde.latte-dock.desktop &&
        test -d /usr/share/plasma/plasmoids/org.kde.latte.containment &&
        test -d /usr/share/plasma/shells/org.kde.latte.shell &&
        echo '--- Uninstall dry-run ---' &&
        bash /src/uninstall.sh --system --no-purge-user-data --dry-run --manifest /build/install_manifest.txt &&
        bash /src/uninstall.sh --system --no-purge-user-data --manifest /build/install_manifest.txt &&
        echo '--- Verifying uninstall ---' &&
        test ! -x /usr/bin/latte-dock-ng &&
        test ! -f /usr/share/applications/org.kde.latte-dock.desktop &&
        echo '=== ARCH: BUILD + INSTALL + UNINSTALL SUCCESS ==='
      "

